<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diary</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-text: #cdccca;
      --color-primary: #4f98a3;
      --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
    }
    #view-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    #login-form {
      background: var(--color-surface);
      padding: 2rem;
      border-radius: 8px;
      max-width: 360px;
      width: 100%;
    }
    #login-form input, #editor-input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0;
      background: var(--color-bg);
      border: 1px solid #333;
      color: var(--color-text);
      border-radius: 4px;
    }
    button {
      background: var(--color-primary);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    #view-main { display: flex; min-height: 100vh; }
    #sidebar {
      width: 280px;
      background: var(--color-surface);
      padding: 1rem;
      overflow: auto;
    }
    #entry-list { list-style: none; padding: 0; }
    #entry-list li {
      padding: 0.35rem 0;
      cursor: pointer;
      border-bottom: 1px solid #2a2926;
    }
    #entry-list li:hover { color: var(--color-primary); }
    #content { flex: 1; padding: 1rem; overflow: auto; }
    #viewer { line-height: 1.6; }
    #viewer img, #image-list img { max-width: 100%; height: auto; border-radius: 4px; margin: 0.5rem 0; }
    #editor-preview {
      margin-top: 0.75rem;
      padding: 1rem;
      background: var(--color-surface);
      border-radius: 4px;
      min-height: 4rem;
    }
    #login-error { color: #e57373; }
    #content .empty-hint { opacity: 0.75; }
    h1 { margin-top: 0; }
    #boot-error {
      background: #3d2929;
      border: 1px solid #c62828;
      color: #ffcdd2;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .content-toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar-btn {
      background: #2d2b28;
      color: var(--color-text);
      border: 1px solid #3d3a36;
    }
    .toolbar-btn.is-active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }
    .editor-hint {
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 0 0 0.5rem;
    }
    #editor textarea#editor-input {
      min-height: 220px;
      font-family: ui-monospace, "SF Mono", Monaco, monospace;
      font-size: 0.95rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>

<div id="view-login">
  <form id="login-form" action="#" method="get">
    <h1>My Diary</h1>
    <p id="boot-error" hidden></p>
    <input type="password" id="password-input" placeholder="パスワード（Cloudflare の Variables「pass」と同じ）" autocomplete="current-password">
    <button type="submit" id="login-submit">ログイン</button>
    <p id="login-error" hidden>パスワードが違います</p>
  </form>
</div>

<div id="view-main" hidden>
  <aside id="sidebar">
    <p class="sidebar-title" style="margin:0 0 0.75rem;font-size:0.85rem;opacity:0.8">日記一覧</p>
    <div id="calendar"><!-- カレンダーUI（未実装） --></div>
    <ul id="entry-list"></ul>
  </aside>
  <main id="content">
    <div id="content-toolbar" class="content-toolbar" hidden>
      <button type="button" id="btn-mode-view" class="toolbar-btn is-active">表示</button>
      <button type="button" id="btn-mode-edit" class="toolbar-btn">編集（Markdown）</button>
    </div>
    <div id="panel-view">
      <div id="viewer"></div>
      <div id="image-list"></div>
    </div>
    <div id="editor" hidden>
      <p class="editor-hint">Markdown で入力できます。下にプレビューが表示されます。画像は保存前にファイルを選んでください。</p>
      <textarea id="editor-input" placeholder="## 今日のこと&#10;&#10;- " rows="14"></textarea>
      <p style="font-size:0.8rem;opacity:0.75;margin:0.35rem 0">プレビュー</p>
      <div id="editor-preview"></div>
      <input type="file" id="image-upload" accept="image/*" multiple>
      <button type="button" id="save-btn">保存</button>
    </div>
  </main>
</div>

<script>
(function () {
  function normalizeBase(url) {
    return String(url || "").trim().replace(/\/+$/, "");
  }

  async function resolveApiBase() {
    const q = new URLSearchParams(location.search).get("api");
    if (q && q.trim()) return normalizeBase(q);

    try {
      const res = await fetch("diary-config.json", { cache: "no-store" });
      if (res.ok) {
        const cfg = await res.json();
        if (cfg && typeof cfg.apiBaseUrl === "string" && cfg.apiBaseUrl.trim()) {
          return normalizeBase(cfg.apiBaseUrl);
        }
        if (cfg && cfg.sameOrigin === true) {
          return location.origin;
        }
      }
    } catch (_) {}

    const h = location.hostname;
    if (h === "localhost" || h === "127.0.0.1" || h === "[::1]") {
      return location.origin;
    }
    if (/\.workers\.dev$/i.test(h)) {
      return location.origin;
    }
    if (/\.pages\.dev$/i.test(h)) {
      return "";
    }
    return "";
  }

  async function boot() {
    const API = await resolveApiBase();
    const API_UNCONFIGURED = !API;
    const isPagesHost = /\.pages\.dev$/i.test(location.hostname);
    let TOKEN = null;
    let selectedDate = null;

    const bootErr = document.getElementById("boot-error");
    if (API_UNCONFIGURED) {
      bootErr.textContent = isPagesHost
        ? "このサイトは Pages（*.pages.dev）です。API は別 URL の Worker です。`diary-config.json` の \"apiBaseUrl\" に `https://（Worker名）.workers.dev` を書き、push して再デプロイしてください。"
        : "API のベース URL が決まりません。`diary-config.json` の apiBaseUrl を設定するか、`?api=` で Worker の URL を指定して開いてください。";
      bootErr.hidden = false;
    }

    function authHeaders() {
      return { Authorization: `Bearer ${TOKEN}`, "Content-Type": "application/json" };
    }

    async function showMain() {
      const vLogin = document.getElementById("view-login");
      const vMain = document.getElementById("view-main");
      vLogin.hidden = true;
      vMain.hidden = false;
      vLogin.setAttribute("aria-hidden", "true");
      vMain.setAttribute("aria-hidden", "false");
      vLogin.style.display = "none";
      vMain.style.display = "flex";
      document.getElementById("content-toolbar").hidden = false;
      setViewMode(false);
      await loadEntryList();
    }

    function setViewMode(reload) {
      document.getElementById("panel-view").hidden = false;
      document.getElementById("editor").hidden = true;
      document.getElementById("btn-mode-view").classList.add("is-active");
      document.getElementById("btn-mode-edit").classList.remove("is-active");
      if (reload && selectedDate) {
        loadEntry(selectedDate);
      }
    }

    async function setEditMode() {
      document.getElementById("panel-view").hidden = true;
      document.getElementById("editor").hidden = false;
      document.getElementById("btn-mode-view").classList.remove("is-active");
      document.getElementById("btn-mode-edit").classList.add("is-active");
      await fillEditorForDate();
    }

    async function fillEditorForDate() {
      const ta = document.getElementById("editor-input");
      const previewEl = document.getElementById("editor-preview");
      const d = selectedDate || new Date().toISOString().split("T")[0];
      const res = await fetch(`${API}/diary/${encodeURIComponent(d)}`, { headers: authHeaders() });
      if (!res.ok) {
        ta.value = "";
        previewEl.innerHTML = "";
        return;
      }
      const { entries } = await res.json();
      const text = (entries || []).map((e) => e.content).join("\n\n---\n\n");
      ta.value = text;
      const md =
        typeof marked !== "undefined" ? marked.parse : (t) => t.replace(/\n/g, "<br>");
      previewEl.innerHTML = md(text);
    }

    async function loadEntryList() {
      const res = await fetch(`${API}/diary`, { headers: authHeaders() });
      if (!res.ok) {
        document.getElementById("entry-list").innerHTML =
          "<li style=\"opacity:0.8\">一覧の取得に失敗しました（API URL・認証を確認）</li>";
        return;
      }
      const { entries } = await res.json();
      const ul = document.getElementById("entry-list");
      ul.innerHTML = entries
        .map(
          (e) =>
            `<li data-date="${e.date}" data-action="load">${e.date} ${e.source === "cron" ? "🤖" : "✏️"}</li>`
        )
        .join("");
      ul.querySelectorAll("li[data-action='load']").forEach((li) => {
        li.addEventListener("click", () => loadEntry(li.getAttribute("data-date")));
      });
    }

    async function loadEntry(date) {
      selectedDate = date;
      const res = await fetch(`${API}/diary/${encodeURIComponent(date)}`, { headers: authHeaders() });
      if (!res.ok) {
        document.getElementById("viewer").innerHTML =
          "<p class=\"empty-hint\">読み込みに失敗しました。</p>";
        document.getElementById("image-list").innerHTML = "";
        return;
      }
      const { entries, images } = await res.json();
      const content = (entries || []).map((e) => e.content).join("\n\n---\n\n");
      const md = typeof marked !== "undefined" ? marked.parse : (t) => t;
      document.getElementById("viewer").innerHTML = md(content || "_（本文なし）_");

      const imgHtml = (images || [])
        .map(
          (img) =>
            `<img src="${API}/images/${encodeURIComponent(img.r2_key)}" loading="lazy" alt="${img.filename || ""}">`
        )
        .join("");
      document.getElementById("image-list").innerHTML = imgHtml;
    }

    async function handleLogin() {
      const loginError = document.getElementById("login-error");
      loginError.hidden = true;
      loginError.textContent = "パスワードが違います"; // reset for next attempt
      const password = document.getElementById("password-input").value.trim();

      if (!password) {
        loginError.textContent = "パスワードを入力してください。";
        loginError.hidden = false;
        return;
      }

      if (!API) {
        loginError.textContent =
          "先に `diary-config.json` の apiBaseUrl を設定するか、`?api=https://….workers.dev` で開いてください。";
        loginError.hidden = false;
        return;
      }

      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 12000);
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        if (res.ok) {
          const { token } = await res.json();
          TOKEN = token;
          await showMain();
          return;
        }
        let msg = "ログインできませんでした。";
        try {
          const j = await res.json();
          if (j && typeof j.error === "string") msg = j.error;
        } catch (_) {}
        if (res.status === 401 && msg === "ログインできませんでした。") {
          msg = "パスワードが Cloudflare の Variables「pass」と一致しません。";
        }
        loginError.textContent = msg;
        loginError.hidden = false;
      } catch (err) {
        console.error(err);
        loginError.textContent =
          "API に接続できません。`diary-config.json` の apiBaseUrl を Worker の URL と照合してください。";
        loginError.hidden = false;
      }
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await handleLogin();
      } catch (err) {
        console.error(err);
        alert("ログイン処理でエラー: " + (err && err.message ? err.message : String(err)));
      }
    });

    document.getElementById("btn-mode-view").addEventListener("click", () => {
      setViewMode(true);
    });
    document.getElementById("btn-mode-edit").addEventListener("click", () => {
      setEditMode();
    });

    document.getElementById("save-btn").addEventListener("click", async () => {
      const date = selectedDate || new Date().toISOString().split("T")[0];
      const content = document.getElementById("editor-input").value;
      await fetch(`${API}/diary`, {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ date, content, source: "manual" }),
      });

      const files = document.getElementById("image-upload").files;
      for (const file of files) {
        const form = new FormData();
        form.append("file", file);
        form.append("date", date);
        await fetch(`${API}/diary/upload-image`, {
          method: "POST",
          headers: { Authorization: `Bearer ${TOKEN}` },
          body: form,
        });
      }

      await loadEntryList();
      await loadEntry(date);
      document.getElementById("editor-input").value = "";
      document.getElementById("image-upload").value = "";
      document.getElementById("editor-preview").innerHTML = "";
      setViewMode(true);
    });

    document.getElementById("editor-input").addEventListener("input", (e) => {
      const md =
        typeof marked !== "undefined" ? marked.parse : (t) => t.replace(/\n/g, "<br>");
      document.getElementById("editor-preview").innerHTML = md(e.target.value);
    });
  }

  boot().catch((err) => {
    console.error(err);
    const el = document.getElementById("boot-error");
    if (el) {
      el.textContent = "起動エラー: ページを再読み込みするか、コンソールを確認してください。";
      el.hidden = false;
    }
  });
})();
</script>
</body>
</html>
