# Cloudflare のプロジェクト名（Workers & Pages の「diary」と一致させる）
name = "diary"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# 静的はリポジトリ直下の index.html / diary-config.json を正とし、deploy 前に static/ へコピー（`npm run sync-static`）。
# directory="." は node_modules 全体が収集されるため使わない。
[assets]
directory = "static"
binding = "ASSETS"

# YOUR_D1_DATABASE_ID のままでは wrangler deploy / CI は失敗します。
# 先行: wrangler d1 create diary-db → ダッシュボード or wrangler d1 list で ID を取得して置換。
[[d1_databases]]
binding = "DB"
database_name = "diary-db"
database_id = "YOUR_D1_DATABASE_ID"

# ダッシュボード「バインディング」でも追加可。binding 名はコード上 env.R2 のため "R2" に統一
[[r2_buckets]]
binding = "R2"
bucket_name = "diary-images"

# 本番はダッシュボードの Variables / Secrets で上書き（JWT_SECRET など）
[vars]
JWT_SECRET = "YOUR_JWT_SECRET_HERE"
# 開発用: 平文パスワード "test" の SHA-256（16進64文字）
ADMIN_PASSWORD_HASH = "9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
