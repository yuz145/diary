# Cloudflare のプロジェクト名（Workers & Pages の「diary」と一致させる）
name = "diary"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# 静的はリポジトリ直下の index.html / diary-config.json を正とし、deploy 前に static/ へコピー（`npm run sync-static`）。
# directory="." は node_modules 全体が収集されるため使わない。
[assets]
directory = "static"
binding = "ASSETS"

# D1: binding 名はダッシュボードと同じ diaryD1。database_id はプレースホルダーのままだと code 10021
# database_name はダッシュボードの D1 名（例: diary）に合わせる
[[d1_databases]]
binding = "diaryD1"
database_name = "diary"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "diaryR2"
bucket_name = "diary-media"

# 機密は wrangler secret put / ダッシュボード「シークレット」のみ（Git に平文を置かない）
# ローカル: `.dev.vars.example` → `.dev.vars` をコピーして記入 → `wrangler dev`
# 手順: docs/PRODUCTION.md
