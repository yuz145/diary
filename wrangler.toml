name = "diary-worker"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "diary-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "diary-images"

# 本番はダッシュボードの Variables / Secrets で上書きすること（パスワード平文は置かない）
[vars]
JWT_SECRET = "YOUR_JWT_SECRET_HERE"
# 開発用: 平文パスワード "test" の SHA-256（16進64文字）
ADMIN_PASSWORD_HASH = "9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
